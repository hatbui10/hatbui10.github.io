<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
<title>Project Builder Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{font-family:Arial;background:#1e1e1e;color:#fff;padding:30px}
.card{max-width:700px;margin:auto;background:#2b2b2b;padding:20px;border-radius:10px}
input,button{padding:10px;font-size:16px}button{cursor:pointer}
</style></head><body><div class="card">
<h2>Project Builder Pro</h2>
<input id="name" value="StudentManager">
<button onclick="build()">Tạo ZIP</button>
<p id="msg"></p></div>
<script>
const css=["style","login","dashboard","student","modal","responsive"];
const js=["main","firebase","login","ui","student","history","excel","storage","search","filter","export","utils"];
function build(){
 let zip=new JSZip();
 let n=document.getElementById("name").value||"Project";
 let p=zip.folder(n);
 let c=p.folder("css"),j=p.folder("js");
 p.folder("image");p.folder("data");
 let links=css.map(x=>`<link rel="stylesheet" href="css/${x}.css">`).join("\n");
 let scripts=js.map(x=>`<script src="js/${x}.js"></`+"script>").join("\n");
 p.file("index.html",`<!DOCTYPE html><html><head><meta charset="UTF-8">${links}</head><body><div id="app"></div>${scripts}</body></html>`);
 css.forEach(f=>c.file(f+".css","/* "+f+".css */\n"));
 js.forEach(f=>j.file(f+".js","// "+f+".js\n"));
 zip.generateAsync({type:"blob"}).then(b=>{
   let a=document.createElement("a");
   a.href=URL.createObjectURL(b);
   a.download=n+".zip";
   a.click();
   msg.textContent="Đã tạo ZIP.";
 });
}
</script></body></html>
