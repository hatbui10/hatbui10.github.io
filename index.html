<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hạt Bụi Tools</title>

<style>

body{
background:#111;
font-family:Arial;
color:white;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{

background:#222;

border-radius:15px;

padding:25px;

text-align:center;

text-decoration:none;

color:white;

transition:.3s;

}

.card:hover{

background:#00bcd4;

transform:translateY(-5px);

}

</style>

</head>

<body>

<h1>🛠 Bộ Công Cụ Của Hạt Bụi</h1>

<div class="grid">

<a class="card" href="project-builder/">
📁
<h2>Project Builder</h2>
</a>

<a class="card" href="student-manager/">
👨‍🎓
<h2>Student Manager</h2>
</a>

<a class="card" href="excel-tools/">
📊
<h2>Excel Tools</h2>
</a>

<a class="card" href="firebase-tools/">
🔥
<h2>Firebase Tools</h2>
</a>

<a class="card" href="html-tools/">
💻
<h2>HTML Tools</h2>
</a>

<a class="card" href="image-tools/">
🖼️
<h2>Image Tools</h2>
</a>

</div>

</body>
</html>
